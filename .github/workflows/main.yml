name: workflow build and test

on:
  push:
    branches:
    - develop
    pull_request:
      branches:
        - develop
        workflow-dispatch:
      jobs:
        build:
          runs-on: ubuntu-latest

          steps:
          - name: Checkout repository
            uses: actions/checkout@v4

          - name: Setup .NET SDK
            uses: actions/setup-dotnet@v4
            with:
              dotnet-version: '7.0.102'

              - name: Install dependencies
                run: dotnet restore

              - name: Execute dotnet build
                run: dotnet build --no-restore

              - name: Run unit tests in test folder
                run: dotnet test

              - name: Publish all projects as Release
                run: dotnet publish

              - name: Upload artifact
                uses: actions/upload-artifact@v4
                with:
                  name: my-net-artifact
                  path: /home/runner/work/AnswerKing-CS-TestAcademy/AnswerKing-CS-TESTAcademy/
